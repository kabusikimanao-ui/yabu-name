<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>の中 — P2P Online Deduction Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">

<!-- manifest.json を削除（404対策） -->
<!-- <link rel="manifest" href="manifest.json"> -->

<meta name="theme-color" content="#e9e0c8">
</head>
<body>
<div class="stage" id="stage"></div>

<div class="lang-switch">
  <button class="lang-btn" id="langBtn">English</button>
</div>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header" id="chatHeader">
    <span class="chat-header-title" id="chatTitle">チャット</span>
    <span class="chat-toggle">▼</span>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input type="text" class="chat-input" id="chatInput" placeholder="メッセージを入力..." maxlength="100">
    <button class="chat-send" id="chatSend">送信</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
